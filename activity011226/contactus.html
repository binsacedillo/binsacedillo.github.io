<body>
    <header>
        <img src="../logo.png" alt="MyShop Logo" class="logo">

    </header>
    <div class="container">
        <nav class="sidebar">

        <main>
            <h2>Contact Us</h2>
            <form class="contact-form">
                <label for="name">Name:</label>

                <textarea id="message" name="message" required></textarea>
                <button type="submit">Submit</button>
            </form>
        </main>
